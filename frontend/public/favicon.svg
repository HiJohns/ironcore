<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- 深蓝到亮青的对角线渐变 -->
    <linearGradient id="hexGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A8A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 微圆角六边形背景 -->
  <path d="M 50 5 
           Q 52 5 54 6 
           L 88 26 
           Q 90 27 90 30 
           L 90 70 
           Q 90 73 88 74 
           L 54 94 
           Q 52 95 50 95 
           Q 48 95 46 94 
           L 12 74 
           Q 10 73 10 70 
           L 10 30 
           Q 10 27 12 26 
           L 46 6 
           Q 48 5 50 5 Z" 
        fill="url(#hexGradient)" />
  
  <!-- 白色 R + 向上折线组合 -->
  <g fill="none" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <!-- 字母 R -->
    <path d="M 28 35 
             L 28 65" />
    <path d="M 28 35 
             Q 45 35 45 42 
             Q 45 50 28 50" />
    <path d="M 35 50 
             L 45 65" />
    
    <!-- 向上折线 (趋势箭头) -->
    <path d="M 52 58 
             L 62 45 
             L 72 52" />
    <path d="M 68 48 
             L 72 52 
             L 76 48" />
  </g>
</svg>