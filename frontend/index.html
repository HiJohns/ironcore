<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report V2 - IronCore Analytics</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            text-align: center;
            padding: 40px;
        }
        
        .logo {
            width: 120px;
            height: 120px;
            margin-bottom: 30px;
        }
        
        h1 {
            color: #00d4ff;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        p {
            color: #888;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="/favicon.svg" alt="Logo" class="logo">
        <h1>Report V2</h1>
        <p>IronCore Analytics Dashboard</p>
    </div>
</body>
</html>
